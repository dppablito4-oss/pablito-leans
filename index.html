<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pablito Leans — Escáner de Documentos</title>
  <meta name="description" content="Escanea documentos desde tu celular o PC. Detecta bordes automáticamente, ajusta esquinas y descarga imágenes limpias y planas. Sin servidores, 100% privado.">
  <meta name="theme-color" content="#07070d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Open Graph -->
  <meta property="og:title" content="Pablito Leans — Escáner de Documentos">
  <meta property="og:description" content="Escanea documentos al instante desde tu navegador. Detección de bordes, ajuste manual y exportación limpia.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://leans.sypablitodp.site">

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============ HEADER ============ -->
  <header class="app-header" id="app-header">
    <img src="assets/favicon.svg" alt="Pablito Leans logo" class="app-logo">
    <h1 class="app-title">Pablito Leans</h1>
    <span class="app-subtitle">Escáner de Documentos</span>
  </header>

  <!-- ============ DOCUMENT TABS ============ -->
  <nav class="tabs-bar" id="tabs-bar">
    <div class="tabs-list" id="tabs-list">
      <!-- Tabs are rendered dynamically by JS -->
    </div>
    <button class="tab-add" id="btn-add-tab" type="button" title="Nuevo Documento">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>Nuevo Documento</span>
    </button>
  </nav>

  <!-- ============ MAIN ============ -->
  <main class="app-main" id="app-main">

    <!-- STATE 1: Upload -->
    <section class="upload-zone" id="upload-zone" aria-label="Subir documento">
      <svg class="upload-zone__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <div class="upload-zone__text">
        <h2>Sube tu documento</h2>
        <p>Arrastra una imagen aquí o usa el botón</p>
      </div>
      <button class="upload-zone__btn" id="btn-select-file" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        Seleccionar archivo
      </button>
      <input type="file" accept="image/*,application/pdf" multiple class="upload-zone__input" id="file-input">
    </section>

    <!-- STATE 2: Editor -->
    <section class="editor-zone hidden" id="editor-zone" aria-label="Editor de esquinas">
      <div class="editor-main">
        <div class="canvas-wrapper" id="canvas-wrapper">
          <canvas id="canvasInput"></canvas>
          <canvas id="canvasOverlay" class="canvas-overlay"></canvas>
        </div>
      </div>
      
      <aside class="editor-sidebar">
        <div class="editor-hint">
          <svg class="editor-hint__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
          <span>Arrastra los puntos para ajustar las esquinas</span>
        </div>
        <div class="editor-top-row">
          <span class="page-counter hidden" id="editor-page-counter">1 / 1</span>
        </div>
        
        <div id="editor-controls" class="controls-panel">
          <button class="btn btn-secondary btn-icon-only" id="btn-rotate" type="button" title="Rotar 90°">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.26l5.67-3.25"/>
            </svg>
          </button>
          <button class="btn btn-secondary btn-icon-only hidden" id="btn-editor-prev" type="button" title="Página anterior">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <button class="btn btn-secondary btn-icon-only hidden" id="btn-editor-next" type="button" title="Página siguiente">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
          <button class="btn btn-secondary" id="btn-cancel" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            <span class="btn-text">Cancelar</span>
          </button>
          <button class="btn btn-primary" id="btn-scan" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            <span class="btn-text" id="btn-scan-text">Escanear</span>
          </button>
        </div>
      </aside>
    </section>

    <!-- STATE 3: Result -->
    <section class="result-zone hidden" id="result-zone" aria-label="Resultado del escaneo">
      <div class="result-main">
        <div class="result-canvas-wrapper">
          <canvas id="canvasOutput"></canvas>
        </div>
      </div>

      <aside class="result-sidebar">
        <div class="result-top-row">
          <div class="result-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Completado
          </div>
          <span class="page-counter hidden" id="page-counter">1 / 1</span>
        </div>

        <div class="pages-strip hidden" id="pages-strip">
          <div class="pages-strip__list" id="pages-strip-list"></div>
        </div>

        <div class="filter-selector" id="filter-selector">
          <button class="filter-option active" data-filter="color" id="filter-color">Color</button>
          <button class="filter-option" data-filter="document" id="filter-document">Documento</button>
          <button class="filter-option" data-filter="whiteboard" id="filter-whiteboard">Pizarra</button>
          <button class="filter-option" data-filter="gray" id="filter-gray">Grises</button>
          <button class="filter-option" data-filter="sepia" id="filter-sepia">Sepia</button>
          <button class="filter-option" data-filter="sketch" id="filter-sketch">Boceto</button>
          <button class="filter-option" data-filter="highcontrast" id="filter-highcontrast">Alto Contraste</button>
          <button class="filter-option" data-filter="manual" id="filter-manual">Ajuste Digital</button>
        </div>

        <div class="manual-adjustments hidden" id="manual-adjustments">
          <div class="slider-group">
            <label for="adj-bg-clean">Limpiar Fondo (Umbral)</label>
            <input type="range" id="adj-bg-clean" class="styled-slider" min="0" max="100" value="50">
          </div>
          <div class="slider-group">
            <label for="adj-saturation">Saturación (Color)</label>
            <input type="range" id="adj-saturation" class="styled-slider" min="0" max="200" value="100">
          </div>
        </div>

        <div id="result-controls" class="controls-panel">
          <button class="btn btn-secondary" id="btn-readjust" type="button" title="Re-ajustar esquinas">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3 3h18v18H3zM8 3v18M16 3v18M3 8h18M3 16h18"/>
            </svg>
            Re-ajustar
          </button>
          <button class="btn btn-secondary" id="btn-apply-all" type="button" title="Aplicar filtro a todas">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 2 7 12 12 22 7 12 2"/>
              <polyline points="2 17 12 22 22 17"/>
              <polyline points="2 12 12 17 22 12"/>
            </svg>
            Aplicar a todas
          </button>
          <button class="btn btn-secondary" id="btn-add-page" type="button" title="Agregar otra página">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/>
              <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
            + Página
          </button>
          <button class="btn btn-danger" id="btn-delete-page" type="button" title="Eliminar página actual">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            Eliminar
          </button>
          <button class="btn btn-primary" id="btn-download" type="button" title="Descargar imágenes">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Imágenes
          </button>
          <button class="btn btn-primary" id="btn-download-pdf" type="button" title="Descargar como PDF">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            PDF
          </button>
        </div>
      </aside>
    </section>

  </main>

  <!-- ============ LOADER OVERLAY ============ -->
  <div class="loader-overlay" id="opencv-loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">
      <strong>Cargando motor de visión</strong>
      Preparando OpenCV.js…
    </div>
    <div class="loader-progress">
      <div class="loader-progress__bar"></div>
    </div>
  </div>

  <!-- ============ UNIFIED EXPORT MODAL ============ -->
  <div class="modal-overlay hidden" id="export-modal-overlay">
    <div class="modal-dialog">
      <div class="modal-header">
        <h3 id="export-modal-title">Exportar Documento</h3>
        <button class="btn-close" id="export-modal-close" type="button" title="Cerrar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <!-- Export Format -->
        <div class="form-group">
          <label>Formato de Archivo</label>
          <div class="radio-group-horizontal">
            <label class="radio-label">
              <input type="radio" name="export-format" value="pdf" checked>
              <span>Documento PDF</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="export-format" value="images">
              <span>Imágenes (JPG)</span>
            </label>
          </div>
        </div>

        <!-- Page Range -->
        <div class="form-group">
          <label for="export-page-range">Páginas a exportar</label>
          <input type="text" id="export-page-range" class="form-input" placeholder="Ej: 1-3, 5 (Vacío = Todas)">
        </div>

        <!-- Page Size -->
        <div class="form-group" id="group-page-size">
          <label for="export-page-size">Tamaño de Hoja / Lienzo</label>
          <select id="export-page-size" class="form-select">
            <option value="A4" selected>A4 (210 × 297 mm)</option>
            <option value="A5">A5 (148 × 210 mm)</option>
            <option value="A3">A3 (297 × 420 mm)</option>
            <option value="A2">A2 (420 × 594 mm)</option>
            <option value="A1">A1 (594 × 841 mm)</option>
            <option value="A0">A0 (841 × 1189 mm)</option>
            <option value="original">Original (Sin reajustar tamaño)</option>
          </select>
        </div>

        <!-- Image Fit -->
        <div class="form-group" id="group-image-fit">
          <label>Ajuste de Imagen</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="export-fit" value="contain" checked>
              <span>Respetar proporción (Bordes blancos)</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="export-fit" value="cover">
              <span>Cubrir hoja (Deformar)</span>
            </label>
          </div>
        </div>

        <!-- Orientation -->
        <div class="form-group" id="group-orientation">
          <label>Orientación de Hoja</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="export-orientation" value="auto" checked>
              <span>Automático (Según imagen)</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="export-orientation" value="portrait">
              <span>Forzar Vertical</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="export-orientation" value="landscape">
              <span>Forzar Horizontal</span>
            </label>
          </div>
        </div>

        <!-- Download Method (Only for Images) -->
        <div class="form-group hidden" id="group-image-method">
          <label>Método de Descarga</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="export-image-method" value="zip" checked>
              <span>Archivo comprimido (ZIP)</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="export-image-method" value="individual">
              <span>Descargar hoja por hoja (Una por una)</span>
            </label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="export-modal-cancel" type="button">Cancelar</button>
        <button class="btn btn-primary" id="export-modal-confirm" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span id="export-confirm-text">Exportar</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ============ TOAST CONTAINER ============ -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- ============ SCRIPTS ============ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <script>
    // Global callback for OpenCV.js readiness
    function onOpenCvReady() {
      console.log('[Pablito Leans] OpenCV.js loaded successfully');
      if (window.App && window.App.onOpenCvReady) {
        window.App.onOpenCvReady();
      } else {
        window._opencvReady = true;
      }
    }

    // Error handler if OpenCV CDN fails to load
    function onOpenCvError() {
      console.error('[Pablito Leans] Failed to load OpenCV.js');
      window._opencvFailed = true;
      // Replace loader content with retry UI
      var loader = document.getElementById('opencv-loader');
      if (loader) {
        loader.innerHTML =
          '<div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;">' +
            '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#FF5252" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
              '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>' +
            '</svg>' +
            '<div style="color:#F0F0F5;font-size:1rem;font-weight:600;">No se pudo cargar el motor de visión</div>' +
            '<div style="color:#8888A0;font-size:0.875rem;">OpenCV.js no respondió. Puede ser un problema temporal del servidor.</div>' +
            '<button onclick="location.reload()" style="margin-top:8px;padding:10px 28px;background:linear-gradient(135deg,#00D4FF,#7B61FF);color:#000;font-weight:600;font-size:0.875rem;border:none;border-radius:9999px;cursor:pointer;">Reintentar</button>' +
          '</div>';
      }
    }
  </script>
  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady()" onerror="onOpenCvError()"></script>
  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(registration => {
          console.log('[Pablito Leans] ServiceWorker registration successful with scope: ', registration.scope);
        }, err => {
          console.log('[Pablito Leans] ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>
</html>
